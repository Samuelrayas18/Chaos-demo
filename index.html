

<head>
  <meta charset="UTF-8" />
  <title>Chaos Theory Demo – Lorenz Attractor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #0ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100%;
      overflow: hidden;
    }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 13px;
    }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    input[type="range"] {
      width: 160px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div><strong>Chaos Theory Demo – Lorenz Attractor</strong></div>
    <div style="margin-top:4px;">
      Initial X offset:
      <input id="offset" type="range" min="-2" max="2" step="0.05" value="0" />
      <span id="offsetValue">0.00</span>
    </div>
    <div style="margin-top:4px;">
      Click &ldquo;Restart&rdquo; after changing the slider to see how
      tiny initial changes give very different paths.
    </div>
    <button id="restart" style="margin-top:6px;">Restart</button>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const offsetSlider = document.getElementById('offset');
    const offsetValue = document.getElementById('offsetValue');
    const restartBtn = document.getElementById('restart');

    
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let X, Y, Z, t, animationId;

    function initState() {
      // Slightly vary the initial X by the slider value
      const off = parseFloat(offsetSlider.value);
      offsetValue.textContent = off.toFixed(2);

      X = 1 + off;
      Y = 1;
      Z = 1;
      t = 0;
    }

    function step() {
      // Clear canvas
      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.beginPath();

      // We follow Frank Force's Lorenz update scheme (scaled for smoothness)
      // and only draw after a "warm-up" so we see the attractor, not the approach.
      const iterations = 4000;
      const warmup = 2000;

      for (let i = 0; i < iterations; i++) {
        // Lorenz-like updates (adapted from the dweet)
        X += (Y - X) / 13;
        Y += (28 - Z) * X / 99;
        Z += (X * Y - Z) / 39;

        if (i > warmup) {
          // Slowly rotate around Z axis using time t
          const cx = canvas.width / 2;
          const cy = canvas.height * 0.7;
          const scaleXY = Math.min(canvas.width, canvas.height) * 0.025;
          const scaleZ = Math.min(canvas.width, canvas.height) * 0.015;

          const cosT = Math.cos(t);
          const sinT = Math.sin(t);

          const px = cx + (X * cosT - Y * sinT) * scaleXY;
          const py = cy - Z * scaleZ;

          if (i === warmup + 1) {
            ctx.moveTo(px, py);
          } else {
            ctx.lineTo(px, py);
          }
        }

        t += 0.0008; // small time increment for slow rotation
      }

      ctx.fillStyle = '#0ff';
      ctx.fill('evenodd');

      animationId = requestAnimationFrame(step);
    }

    function restart() {
      cancelAnimationFrame(animationId);
      initState();
      step();
    }

    restartBtn.addEventListener('click', restart);
    offsetSlider.addEventListener('input', () => {
      offsetValue.textContent = parseFloat(offsetSlider.value).toFixed(2);
    });

    // Initial run
    initState();
    step();
  </script>
</body>
</html>
