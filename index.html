<!-- index.html: Simple chaos demo -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chaos Theory Demo</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #111; color: #eee; }
    #controls { padding: 10px; background: #222; display: flex; align-items: center; gap: 10px; }
    #canvas { display: block; background: #000; }
    label { font-size: 14px; }
  </style>
</head>
<body>
  <div id="controls">
    <label>Starting angle offset:
      <input id="angle" type="range" min="-0.05" max="0.05" step="0.001" value="0">
    </label>
    <button id="run">Run</button>
    <span id="info"></span>
  </div>
  <canvas id="canvas" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const angleSlider = document.getElementById('angle');
    const runBtn = document.getElementById('run');
    const info = document.getElementById('info');

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    function resetField() {
      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw “gravity well”
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(centerX, centerY, 80, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#0f0';
      ctx.fillText('Try small angle changes → huge path changes', 10, 20);
    }

    function runSim(offsetAngle) {
      resetField();
      info.textContent = `Angle offset: ${offsetAngle.toFixed(3)} rad`;

      let x = centerX - 250;
      let y = centerY;
      const speed = 3;
      const baseAngle = 0;
      let vx = speed * Math.cos(baseAngle + offsetAngle);
      let vy = speed * Math.sin(baseAngle + offsetAngle);

      ctx.strokeStyle = '#0ff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, y);

      let steps = 0;
      function step() {
        steps++;

        // Simple chaotic force: attraction to center plus nonlinear twist
        const dx = centerX - x;
        const dy = centerY - y;
        const r2 = dx*dx + dy*dy + 0.01;
        const force = 2000 / r2; // stronger near center

        // Nonlinear “twist” term
        const twist = 0.001 * Math.sin(x * 0.03) * Math.cos(y * 0.02);

        vx += (dx * force * 0.0005) + twist * vy;
        vy += (dy * force * 0.0005) - twist * vx;

        x += vx;
        y += vy;

        ctx.lineTo(x, y);
        ctx.stroke();

        // Stop if it leaves the screen or after many steps
        if (x < 0 || x > canvas.width || y < 0 || y > canvas.height || steps > 4000) {
          return;
        }
        requestAnimationFrame(step);
      }
      step();
    }

    runBtn.addEventListener('click', () => {
      const offset = parseFloat(angleSlider.value);
      runSim(offset);
    });

    resetField();
  </script>
</body>
</html>
